# Запуск: из корня репозитория выполните: docker compose up --build
# Веб-интерфейс: http://localhost  | API (через тот же хост): /api
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thesis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - thesis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thesis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-совместимое API для гибридного хранилища (новые файлы — в бакет при APP_STORAGE_NEW_FILES=object)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - thesis_minio:/data

  backend:
    build:
      context: ./thesis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/thesis_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      FILE_UPLOAD_DIR: /app/uploads
      APP_STORAGE_OBJECT_ENABLED: ${APP_STORAGE_OBJECT_ENABLED:-true}
      APP_STORAGE_OBJECT_ENDPOINT: ${APP_STORAGE_OBJECT_ENDPOINT:-http://minio:9000}
      APP_STORAGE_NEW_FILES: ${APP_STORAGE_NEW_FILES:-object}
      APP_STORAGE_OBJECT_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_STORAGE_OBJECT_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:3000}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      # DEV_TOOLS_ENABLED=true — включить /api/dev/* и /api/debug/* (SMTP-тесты; только для отладки)
      DEV_TOOLS_ENABLED: ${DEV_TOOLS_ENABLED:-false}
      # MAIL_PASSWORD не задаём пустым — иначе перезапишется дефолт из application.properties.
      # Чтобы переопределить пароль в Docker: добавьте сюда MAIL_PASSWORD: ${MAIL_PASSWORD} и задайте в .env
    volumes:
      - thesis_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./thesis-frontend
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  thesis_pgdata:
  thesis_uploads:
  thesis_minio:
